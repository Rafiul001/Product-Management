# Render Blueprint for the Express/Mongoose API server.
# Docs: https://render.com/docs/blueprint-spec
#
# Deploy: push this repo to GitHub, then in the Render dashboard choose
# "New +" -> "Blueprint" and point it at this repo. Render reads this file,
# creates the service, and prompts you for every `sync: false` secret below.
services:
  - type: web
    name: product-management-api
    runtime: node
    plan: free
    region: oregon # change to your nearest region (e.g. frankfurt, singapore)
    branch: main
    autoDeploy: true
    # The compiler (typescript, tsc-alias, @types/node) lives in devDependencies,
    # but NODE_ENV=production makes npm skip those by default — so `--include=dev`
    # forces them to install for the build. They are not needed at runtime.
    buildCommand: npm install --include=dev && npm run build:server
    startCommand: npm run start:server
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 22.11.0
      - key: NODE_ENV
        value: production

      # --- Database (MongoDB Atlas) ---
      # DB_CONNECTION_URL = your full Atlas SRV string, e.g.
      #   mongodb+srv://<user>:<password>@<cluster>.mongodb.net/?appName=<app>
      # The database name is supplied separately via DATABASE (below), so the
      # path part of the URI is optional.
      - key: DB_CONNECTION_URL
        sync: false
      - key: DATABASE
        value: nexvolt

      # --- URLs ---
      # CLIENT_URL must exactly match your Netlify site origin (used for CORS).
      # SERVER_URL is this service's own public URL (https://<name>.onrender.com).
      - key: CLIENT_URL
        sync: false
      - key: SERVER_URL
        sync: false

      # --- Auth secrets ---
      - key: JSON_WEB_TOKEN_SECRET
        sync: false
      - key: REFRESH_TOKEN_SECRET
        sync: false

      # --- Email (Resend HTTPS API — Render blocks outbound SMTP, so Gmail/SMTP
      # won't work here. Get a key at resend.com and verify a sending domain.) ---
      - key: RESEND_API_KEY
        sync: false
      # Verified sender, e.g. "E-commerce <noreply@yourdomain.com>"
      - key: EMAIL_FROM
        sync: false

      # --- File uploads (memory storage -> Cloudinary; dir is just for static serve) ---
      - key: UPLOAD_DIR
        value: uploads/
      - key: CLOUDINARY_URL
        sync: false

      # --- SSLCommerz payment gateway ---
      - key: SSL_STORE_ID
        sync: false
      - key: SSL_STORE_PASSWORD
        sync: false
      - key: SSL_IS_LIVE
        value: "false"
